<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e0e14">
<title>Corvus</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#0e0e14; --panel:#171722; --panel2:#1f1f2e; --line:#2a2a3c;
    --ink:#e9e9f2; --dim:#9a9ab0; --accent:#7c6cff; --accent2:#4f46e5;
    --ok:#2ecc71; --bad:#ff6b6b; --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, #1a1830 0%, var(--bg) 55%);
    color:var(--ink); font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  header{display:flex;align-items:center;gap:12px;padding:16px 18px;position:sticky;top:0;
    background:rgba(14,14,20,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);z-index:5}
  .logo{width:34px;height:34px;flex:0 0 auto}
  .brand{font-weight:700;letter-spacing:.3px;font-size:19px}
  .sub{color:var(--dim);font-size:12px;margin-top:-2px}
  .status{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--dim)}
  .dot{width:9px;height:9px;border-radius:50%;background:#555;box-shadow:0 0 0 3px rgba(255,255,255,.03)}
  .dot.on{background:var(--ok)} .dot.off{background:var(--bad)}
  main{max-width:760px;margin:0 auto;padding:18px 16px 60px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:16px}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin:0 0 12px}
  textarea,input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:12px;padding:12px 14px;font:inherit;outline:none}
  textarea{min-height:78px;resize:vertical}
  input:focus,textarea:focus{border-color:var(--accent)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  button{background:linear-gradient(180deg,var(--accent),var(--accent2));color:#fff;border:0;
    border-radius:12px;padding:12px 18px;font:inherit;font-weight:600;cursor:pointer}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);font-weight:500}
  button:disabled{opacity:.5;cursor:not-allowed}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tab{padding:8px 13px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);
    color:var(--dim);cursor:pointer;font-size:13px}
  .tab.active{color:#fff;border-color:var(--accent);background:rgba(124,108,255,.16)}
  .list{list-style:none;margin:0;padding:0}
  .list li{padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;
    background:var(--panel2);font-size:14px;white-space:pre-wrap;word-break:break-word}
  .muted{color:var(--dim)} .small{font-size:12px}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
  .badge.ok{background:rgba(46,204,113,.15);color:var(--ok)} .badge.bad{background:rgba(255,107,107,.15);color:var(--bad)}
  details summary{cursor:pointer;color:var(--dim);font-size:13px}
  .out{white-space:pre-wrap;word-break:break-word;background:var(--panel2);border:1px solid var(--line);
    border-radius:12px;padding:14px;margin-top:12px;min-height:20px}
  .field{margin-bottom:10px} label{display:block;font-size:12px;color:var(--dim);margin-bottom:5px}
</style>
</head>
<body>
<header>
  <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b7cff"/><stop offset="1" stop-color="#4f46e5"/></linearGradient></defs>
    <circle cx="32" cy="32" r="30" fill="url(#g)"/>
    <path d="M20 40c4-2 7-6 8-11 3 5 8 7 14 6-3 5-9 9-16 9-2 0-4-1-6-4z" fill="#0e0e14"/>
    <circle cx="27" cy="26" r="2.6" fill="#0e0e14"/>
  </svg>
  <div>
    <div class="brand">Corvus</div>
    <div class="sub">self-improving coding agent</div>
  </div>
  <div class="status"><span id="dot" class="dot"></span><span id="statusText">not connected</span></div>
</header>

<main>
  <div class="card">
    <details id="settings">
      <summary>Connection settings</summary>
      <div style="margin-top:12px">
        <div class="field"><label>API base URL</label>
          <input id="apiBase" placeholder="http://localhost:8000" autocapitalize="off" autocorrect="off"></div>
        <div class="field"><label>API token (if the server sets one)</label>
          <input id="apiToken" type="password" placeholder="CORVUS_API_TOKEN"></div>
        <div class="row"><button id="saveConn">Save & connect</button>
          <button class="ghost" id="testConn">Test</button></div>
      </div>
    </details>
  </div>

  <div class="card">
    <h2>Give Corvus a task</h2>
    <textarea id="task" placeholder="Write a prime sieve in primes.py with pytest tests and make them pass"></textarea>
    <div class="row" style="margin-top:12px">
      <button id="run">Run task</button>
      <span id="runHint" class="muted small" style="align-self:center"></span>
    </div>
    <ul class="list" id="trace" style="margin-top:12px"></ul>
    <div id="result" class="out muted">Results appear here.</div>
  </div>

  <div class="card">
    <div class="tabs" id="tabs">
      <span class="tab active" data-t="lessons">Lessons</span>
      <span class="tab" data-t="memories">Memories</span>
      <span class="tab" data-t="skills">Skills</span>
      <span class="tab" data-t="checkpoints">Checkpoints</span>
    </div>
    <div class="row" style="margin-bottom:10px">
      <button class="ghost small" id="refresh">Refresh</button>
      <button class="ghost small" id="snapshot">Save checkpoint…</button>
    </div>
    <ul class="list" id="list"><li class="muted">Connect to load learned state.</li></ul>
  </div>
  <p class="muted small" style="text-align:center">Corvus runs on your computer/server via <code>corvus serve</code>. This app is a client.</p>
</main>

<script src="app.js"></script>
</body>
</html>
